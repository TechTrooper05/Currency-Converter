<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Currency Converter</title>
</head>
<body>
    <div class="content-box">
        <div class="heading">Currency Converter</div>
        <div class="amount">
            <p>Enter Amount</p>
            <input type="text" value="1" placeholder="1">
        </div>
        <form>
        <div class="conversion">
            <div class="dropdown">
                <div class="from">
                    <p>From</p>
                    <select name="from"></select>
                </div>
            </div>
            <i class="fa-solid fa-arrow-right-arrow-left" id="exchange-symbol"></i>
            <div class="dropdown">
                <div class="to">
                    <p>To</p>
                    <select name="to"></select>
                </div>
            </div>
        </div>
        <div class="converted-val"></div>
        <button id="btn">Get Exchange Rate</button>
        </form>
    </div>
    <script src="countries.js"></script>
    <script src="script.js"></script>
</body>
</html>
